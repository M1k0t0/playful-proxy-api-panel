services:
  cli-proxy-api:
    image: ${CLI_PROXY_IMAGE:-ghcr.io/daishuge/playful-proxy-api-panel:latest}
    pull_policy: missing
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-dev}
        COMMIT: ${COMMIT:-none}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    container_name: cli-proxy-api
    # env_file:
    #   - .env
    environment:
      DEPLOY: ${DEPLOY:-}
      MANAGEMENT_STATIC_PATH: /CLIProxyAPI/static/management.html
      WRITABLE_PATH: /CLIProxyAPI/data
    ports:
      - "${CLI_PROXY_HTTP_PORT:-8317}:8317"
      - "${CLI_PROXY_PANEL_PORT:-8085}:8085"
      - "${CLI_PROXY_CODEX_CALLBACK_PORT:-1455}:1455"
      - "${CLI_PROXY_GEMINI_CALLBACK_PORT:-54545}:54545"
      - "${CLI_PROXY_ANTIGRAVITY_CALLBACK_PORT:-51121}:51121"
      - "${CLI_PROXY_AMP_CALLBACK_PORT:-11451}:11451"
    volumes:
      - ${CLI_PROXY_CONFIG_PATH:-./config.yaml}:/CLIProxyAPI/config.yaml
      - ${CLI_PROXY_AUTH_PATH:-./auths}:/root/.cli-proxy-api
      - ${CLI_PROXY_DATA_PATH:-./data}:/CLIProxyAPI/data
      - ${CLI_PROXY_LOG_PATH:-./logs}:/CLIProxyAPI/logs
    restart: unless-stopped
